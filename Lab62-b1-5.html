<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="Lab62-b1-5.css">
</head>
<body>
    <input type="checkbox" id="menu-toggle">
        <div>
            <label for="menu-toggle" class="menu-button">
                <span class="icon-open">☰</span>
                <span class="icon-close">X</span>
            </label>
        </div>
        
        <nav class="nav_link">
            <ul>
                <li><a href="">FEATURES</a></li>
                <li><a href="">ABOUT</a></li>
                <li><a href="">PRODUCTS</a></li>
                <li><a href="">SERVICES</a></li>
                <li><a href="">CONTACTS</a></li>
            </ul>
        </nav>

    <div id="contact">
        <!--contact info-->
        <div class="contact-info">
            <!--contact item-->
            <div class="contact-item">
                <h3 class="heading_first">
                    <!--<span class="contact icon">-->
                    ADDRESS
                </h3>
                <p class="contact-info">
                    523 N Fairfax <br>
                    Ave<br>
                    Los Angeles, <br>
                    CA 90048
                </p>
            </div>
            <div class="contact-item">
                <h3 class="heading_second">EMAIL</h3>
                email@email.com
            </div>

            <div class="contact-item">
                <h3 class="heading_thist">TELEPHONE</h3>
                + 123 456 789
            </div>
        </div>
        <!--contact form-->
        <div class="contact-form">
            <h3 class="heading_first">contact us</h3>
            <form>
                <div class="form-group">
                <!--inputs-->
                <input 
                    type="text"
                    placeholder="name"
                    class="form-control"
                    name="name"
                /><br>
                <input 
                    type="email"
                    placeholder="email"
                    class="form-control"
                    name="email"
                /><br>
                <textarea 
                    name="message"
                    placeholder="message"
                    class="form-control"
                    rows="5"
                ></textarea><br>
                </div>
                <!--button-->
                <button type="submit" class="btn submit-btn">submit here</button>
            </form>
        </div>
    </div>
</body>
</html>
